# "Cut release" — the one button that starts a release. Run it from the Forgejo
# UI (Actions → Cut release → Run workflow), pick a bump, and it:
#   1. repins backend/frontend submodules to their latest tag (or the ref you give)
#   2. bumps VERSION (semver: patch/minor/major)
#   3. promotes the CHANGELOG [Unreleased] section to [X.Y.Z] - <date> (write
#      your release notes there before cutting — that text is the release body)
#   4. commits "release: X.Y.Z" and tags vX.Y.Z, then pushes
#
# The tag fans out to the build pipelines: .forgejo/workflows/release.yml
# (git.horn) and, via the push mirror, .github/workflows/release.yml (Docker Hub
# + GHCR). It MUST run on Forgejo because the mirror is one-way (Forgejo → GitHub),
# so the tag has to originate here.
#
# Required Forgejo Actions secret:
#   RELEASE_TOKEN  a PAT with write access to this repo. Used to push the commit
#                  and tag. It must be a PAT (not the automatic Actions token):
#                  pushes by the auto token do NOT trigger the build workflows.
name: Cut release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump"
        type: choice
        options: [patch, minor, major]
        default: patch
      backend_ref:
        description: "backend ref to ship (blank = its latest semver tag)"
        required: false
        default: ""
      frontend_ref:
        description: "frontend ref to ship (blank = its latest semver tag)"
        required: false
        default: ""

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # No `submodules: recursive`: .gitmodules points at GitHub (public
          # default), which actions/checkout cannot rewrite to git.horn and the
          # public repos don't exist yet. We init them ourselves below.
          # PAT so the resulting tag push triggers the build workflows.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "cueBreaker release bot"
          git config user.email "release-bot@git.horn"

      - name: Init submodules from git.horn
        run: |
          # Rewrite the GitHub submodule URLs to git.horn (repos are public
          # there, so no token needed). The rewrite is global, so the later
          # `git -C backend fetch origin` in the repin step also hits git.horn.
          git config --global \
            url."https://git.horn/cueBreaker/".insteadOf \
            "https://github.com/semsemyonoff/cueBreaker-"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Repin submodules to their tags
        run: |
          set -euo pipefail
          repin() {  # $1=path  $2=requested ref (may be empty)
            local path="$1" ref="$2"
            git -C "$path" fetch --tags --force origin
            git -C "$path" fetch --force --unshallow origin 2>/dev/null || true
            if [ -z "$ref" ]; then
              ref="$(git -C "$path" tag --list --sort=-v:refname \
                     | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
            fi
            test -n "$ref" || { echo "ERROR: no semver tag in $path and no ref given" >&2; exit 1; }
            git -C "$path" checkout --detach "$ref"
            echo "$path -> $ref"
          }
          repin backend  '${{ inputs.backend_ref }}'
          repin frontend '${{ inputs.frontend_ref }}'
          git add backend frontend

      - name: Bump VERSION
        id: ver
        run: |
          set -euo pipefail
          cur="$(cat VERSION 2>/dev/null || echo 0.0.0)"
          IFS=. read -r MA MI PA <<< "$cur"
          case "${{ inputs.bump }}" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          new="${MA}.${MI}.${PA}"
          echo "$new" > VERSION
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "VERSION: $cur -> $new"

      - name: Promote Unreleased to the new version
        run: |
          set -euo pipefail
          new="${{ steps.ver.outputs.version }}"
          today="$(date +%Y-%m-%d)"

          grep -q '^## \[Unreleased\]' CHANGELOG.md \
            || { echo "ERROR: no '## [Unreleased]' heading in CHANGELOG.md" >&2; exit 1; }

          # Release notes = the [Unreleased] body (everything up to the next
          # version heading), with HTML-comment guidance and edge blank lines
          # stripped. This text becomes both the new CHANGELOG section and the
          # GitHub/Forgejo release body.
          awk '
            /^## \[Unreleased\]/ {seen=1; next}
            seen==0 {next}
            /^## \[/ {exit}
            /<!--/ {inc=1}
            inc==1 { if (/-->/) inc=0; next }
            {print}
          ' CHANGELOG.md > /tmp/body.md
          awk 'NF && !s {s=NR} NF {e=NR} {a[NR]=$0} END {if (s) for (i=s; i<=e; i++) print a[i]}' \
            /tmp/body.md > /tmp/section.md
          test -s /tmp/section.md \
            || { echo "ERROR: [Unreleased] is empty — write release notes there before cutting." >&2; exit 1; }

          # Rebuild CHANGELOG: header through the Unreleased heading, a fresh
          # empty Unreleased, the promoted version, then any older versions.
          awk '{print} /^## \[Unreleased\]/{exit}' CHANGELOG.md > /tmp/head.md
          awk '
            /^## \[Unreleased\]/ {seen=1; next}
            seen && /^## \[/ {tail=1}
            tail {print}
          ' CHANGELOG.md > /tmp/tail.md
          {
            cat /tmp/head.md
            printf '\n<!-- Write notes for the next release here. "Cut release" promotes this\n'
            printf '     section to ## [X.Y.Z] - <date> and uses it as the release body. -->\n\n'
            printf '## [%s] - %s\n\n' "$new" "$today"
            cat /tmp/section.md
            printf '\n'
            if [ -s /tmp/tail.md ]; then printf '\n'; cat /tmp/tail.md; fi
          } > CHANGELOG.md
          echo "Promoted [Unreleased] -> [$new] - $today"

      - name: Commit, tag, push
        run: |
          set -euo pipefail
          new="${{ steps.ver.outputs.version }}"
          git add VERSION CHANGELOG.md backend frontend
          git commit -m "release: ${new}"
          git tag -a "v${new}" -m "cueBreaker ${new}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${new}"
          echo "Released v${new} — build pipelines will pick up the tag."

      - name: Create Forgejo release
        env:
          TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          new="${{ steps.ver.outputs.version }}"
          # Body = the promoted [Unreleased] notes (/tmp/section.md).
          payload="$(jq -n --arg tag "v${new}" --arg name "cueBreaker ${new}" \
            --rawfile body /tmp/section.md '{tag_name:$tag, name:$name, body:$body}')"
          code="$(curl -sS -o /tmp/release.json -w '%{http_code}' \
            -X POST "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${payload}")"
          echo "Forgejo releases API → HTTP ${code}"
          case "${code}" in
            201) echo "Forgejo release v${new} created." ;;
            *) cat /tmp/release.json >&2; echo "ERROR: Forgejo release create failed" >&2; exit 1 ;;
          esac
