# Public release build — runs on GitHub Actions when a vX.Y.Z tag arrives
# (pushed here by the Forgejo → GitHub push mirror). Builds the multi-arch image
# from the pinned submodules and pushes it to the public registries:
#   - Docker Hub  semsemyonoff/cuebreaker
#   - GHCR        ghcr.io/semsemyonoff/cuebreaker
#
# Forgejo also scans .github/workflows, so this job is guarded to run ONLY on
# github.com (on Forgejo it no-ops; git.horn is handled by .forgejo/workflows).
#
# Required repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
# GHCR uses the built-in GITHUB_TOKEN (needs packages: write below).
name: release (public)

on:
  push:
    tags: ["v*"]

jobs:
  build-push:
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (Docker Hub + GHCR)
        env:
          CUEBREAKER_IMAGES: "semsemyonoff/cuebreaker ghcr.io/semsemyonoff/cuebreaker"
          CUEBREAKER_TAGS: "${{ steps.ver.outputs.version }} latest"
        run: ./build.sh

      - name: Extract release notes from CHANGELOG
        run: |
          ver="${{ steps.ver.outputs.version }}"
          awk -v v="$ver" '
            $0 ~ "^## \\[" v "\\]" { f=1; print; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > /tmp/notes.md
          test -s /tmp/notes.md || echo "cueBreaker ${ver}." > /tmp/notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "cueBreaker ${{ steps.ver.outputs.version }}"
          body_path: /tmp/notes.md
